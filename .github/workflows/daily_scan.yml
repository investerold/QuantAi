name: Market Watchdog (Batch Optimized)

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies
      run: pip install requests yfinance google-genai google-api-core

    - name: Run Watchdog Script
      timeout-minutes: 10
      env:
        NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python news_watchdog.py

    - name: Commit and Push History
      if: success()
      continue-on-error: true
      run: |
        git config --global user.name "MarketBot"
        git config --global user.email "bot@github.com"
        
        touch news_history.json
        git add news_history.json
        
        if git diff --staged --quiet; then
          echo "No changes to history. Skipping push."
        else
          git commit -m "Update news history [skip ci]"
          git push
        fi

    - name: Notify on failure
      if: failure()
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        curl -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
          -d "chat_id=${TELEGRAM_CHAT_ID}" \
          -d "text=⚠️ Market Watchdog failed: Check workflow logs"
