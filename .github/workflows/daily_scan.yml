name: Market Watchdog (Batch Optimized)

on:
  schedule:
    # 每 2 小時運行一次
    - cron: '0 */2 * * *'
  workflow_dispatch: # 手動觸發按鈕

permissions:
  contents: write

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install Dependencies
      # ✅ 加入 google-genai 確保腳本能呼叫 Gemini
      run: pip install requests yfinance google-genai google-api-core

    - name: Run Watchdog Script
      env:
        # ✅ 補上 NEWS_API_KEY
        NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        # 可選:覆寫 Gemini 模型 / 分析模式 / 是否推送 fallback 結果
        # 預設用 gemini-2.5-flash-lite (見 news_watchdog.py);如要改例如 gemini-2.5-flash,
        # 可於 repo Settings → Variables 加 GEMINI_MODEL。
        GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
        ANALYSIS_MODE: ${{ vars.ANALYSIS_MODE }}
        NOTIFY_ON_FALLBACK: ${{ vars.NOTIFY_ON_FALLBACK }}
      run: python news_watchdog.py
      
    - name: Commit and Push History
      run: |
        git config --global user.name "MarketBot"
        git config --global user.email "bot@github.com"
        
        # 確保文件存在
        touch news_history.json
        
        git add news_history.json
        
        # 只有在有變動時才 Commit，避免空 Commit 報錯
        if git diff --staged --quiet; then
          echo "No changes to history. Skipping push."
        else
          git commit -m "Update news history [skip ci]"
          git push
        fi
